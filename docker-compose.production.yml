# Reimbursement — production compose for the `evergreen` host.
#
# Topology:
#
#   Cloudflare Tunnel (asgard) ──▶ host:5800 (LAN-bound) ──▶ reimbursement-v2-web
#                                                                    │
#                                                                    ▼
#                                                          reimbursement-v2-api
#                                                                    │
#                                                                    ▼
#                                                       reimbursement-v2-postgres
#                                                       (internal-only)
#
# The web container's own nginx (apps/web/nginx.conf) handles SPA fallback
# and proxies /api + /uploads to the api container over the
# reimbursement_v2_internal Docker network. There is NO host-level nginx in
# front — cloudflared routes the public hostname directly to host port 5800.
# The port binds on all interfaces (cloudflared talks to apps via the host's
# LAN IP, not loopback), but evergreen sits behind a firewall + Cloudflare
# Tunnel so the only path from public to this port is via the tunnel.
#
# Postgres has no host port mapping in production. To inspect prod data, exec
# into the postgres container directly:
#     docker exec -it reimbursement-v2-postgres psql -U postgres -d reimbursement
#
# All secrets come from `.env` (materialized by the GitHub Actions deploy job
# from repo Secrets). Do NOT bake any secret defaults into this file.

# Pin the project name so the running containers + named volumes are
# recognized regardless of the deploy directory's path. Without this,
# compose derives the project from the cwd basename — so renaming the
# deploy dir would orphan the existing reimbursement-v2-* containers and
# data volumes.
name: reimbursement-v2

services:
  postgres:
    image: postgres:16-alpine
    container_name: reimbursement-v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-reimbursement}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reimbursement_v2_internal
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-reimbursement}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    image: ghcr.io/thehfhotel/reimbursement-v2-api:${IMAGE_TAG:-latest}
    container_name: reimbursement-v2-api
    restart: unless-stopped
    # No host port binding — only reachable through the web container's nginx.
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      LINE_REDIRECT_URI: ${LINE_REDIRECT_URI}
      WEB_BASE_URL: ${WEB_BASE_URL}
    volumes:
      # Persistent storage for receipt photos and transfer screenshots.
      # Mount path matches the apps/api/uploads directory inside the image.
      - uploads_data:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reimbursement_v2_internal
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS --max-time 3 http://localhost:3001/health > /dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: ghcr.io/thehfhotel/reimbursement-v2-web:${IMAGE_TAG:-latest}
    container_name: reimbursement-v2-web
    restart: unless-stopped
    # Cloudflare Tunnel routes reimbursement.thehfhotel.org directly to this
    # host port. The web container's own nginx handles SPA fallback and
    # /api + /uploads proxying to the api container — no host-level nginx
    # in front. Pick a host port that doesn't collide with the asgard
    # tunnel's existing routes.
    ports:
      # Bound on all interfaces so cloudflared (which reaches the app via
      # the host's LAN IP, like every other app on this fleet) can connect.
      # The port isn't reachable from the public internet — only the LAN
      # and the cloudflared tunnel.
      - "5800:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - reimbursement_v2_internal
    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --tries=1 --spider http://127.0.0.1/healthz || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    name: reimbursement_v2_postgres_data
  uploads_data:
    name: reimbursement_v2_uploads_data

networks:
  # Per-app private network: web ↔ api ↔ postgres.
  reimbursement_v2_internal:
    name: reimbursement_v2_internal
    driver: bridge
