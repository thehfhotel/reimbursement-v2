name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys so two back-to-back pushes to main don't have their
# `docker compose up` interleave. cancel-in-progress is OFF — an in-flight
# deploy already pulled images and may be mid-migration.
concurrency:
  group: deploy-reimbursement-v2
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: thehfhotel
  API_IMAGE: thehfhotel/reimbursement-v2-api
  WEB_IMAGE: thehfhotel/reimbursement-v2-web

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Build the api + web images and push to GHCR.
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push (api + web)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    outputs:
      sha-tag: sha-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── api image ─────────────────────────────────────────────────────
      - name: Compute api tags
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=long

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=reimbursement-v2-api
          cache-to: type=gha,mode=max,scope=reimbursement-v2-api
          platforms: linux/amd64

      # ── web image ─────────────────────────────────────────────────────
      - name: Compute web tags
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=long

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=reimbursement-v2-web
          cache-to: type=gha,mode=max,scope=reimbursement-v2-web
          platforms: linux/amd64

      - name: Summary
        run: |
          {
            echo "## Reimbursement-v2 images"
            echo ""
            echo "### api"
            echo '```'
            echo "${{ steps.meta-api.outputs.tags }}"
            echo '```'
            echo ""
            echo "### web"
            echo '```'
            echo "${{ steps.meta-web.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────
  # Deploy to evergreen via SSH from a GitHub-hosted runner.
  #
  # Connection path:  GH-hosted runner → cloudflared (Cloudflare Access
  # service token) → SSH (deploy user, ed25519 key) → evergreen.
  # ──────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to evergreen
    runs-on: ubuntu-latest
    needs: [build]
    environment: production
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    env:
      SSH_HOST: evergreen.thehfhotel.org
      SSH_USER: reimbursement-v2
      DEPLOY_DIR: /home/reimbursement-v2/production

    steps:
      - name: Checkout (compose file only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.production.yml
          sparse-checkout-cone-mode: false

      - name: Install cloudflared
        run: |
          set -euo pipefail
          curl -fsSL --output /tmp/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          install -m 0755 /tmp/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Configure SSH (key + known_hosts + cloudflared ProxyCommand)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          # Optional Cloudflare Access service token. Only needed if the
          # evergreen SSH cloudflared tunnel has an Access app enforcing
          # auth. If unset, cloudflared routes through the tunnel without
          # presenting headers — relying on SSH key auth for security.
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          for var in SSH_PRIVATE_KEY SSH_KNOWN_HOSTS; do
            if [ -z "${!var:-}" ]; then
              echo "::error::required secret $var is empty — see DEPLOYMENT.md for setup"
              exit 1
            fi
          done

          umask 077
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

          # Build the ProxyCommand. If a service token is configured, include
          # it; otherwise cloudflared just routes through the tunnel.
          if [ -n "${CF_ACCESS_CLIENT_ID:-}" ] && [ -n "${CF_ACCESS_CLIENT_SECRET:-}" ]; then
            PROXY="cloudflared access ssh --hostname %h --service-token-id ${CF_ACCESS_CLIENT_ID} --service-token-secret ${CF_ACCESS_CLIENT_SECRET}"
          else
            PROXY="cloudflared access ssh --hostname %h"
          fi

          cat > ~/.ssh/config <<EOF
          Host evergreen
            HostName ${SSH_HOST}
            User ${SSH_USER}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            UserKnownHostsFile ~/.ssh/known_hosts
            StrictHostKeyChecking yes
            ServerAliveInterval 15
            ServerAliveCountMax 3
            # Force public-key only. The server's sshd should also have
            # PasswordAuthentication=no, but we lock it down on the client
            # side too so a compromised server config can't downgrade us.
            PreferredAuthentications publickey
            PubkeyAuthentication yes
            PasswordAuthentication no
            KbdInteractiveAuthentication no
            HostbasedAuthentication no
            GSSAPIAuthentication no
            BatchMode yes
            ProxyCommand ${PROXY}
          EOF
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts ~/.ssh/config

      - name: Smoke-test SSH
        run: ssh evergreen "echo connected as \$(id -un) on \$(hostname)"

      - name: Sync compose file
        run: |
          set -euo pipefail
          ssh evergreen "mkdir -p ${DEPLOY_DIR}"
          scp docker-compose.production.yml evergreen:${DEPLOY_DIR}/docker-compose.yml

      - name: Materialize .env from secrets
        # Keep .env off this runner's disk — it's piped over SSH and written
        # straight into the deploy host with mode 0600.
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LINE_CHANNEL_ID: ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          for var in JWT_SECRET LINE_CHANNEL_ID LINE_CHANNEL_SECRET POSTGRES_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "::error::required secret $var is empty"
              exit 1
            fi
          done

          # The here-doc is built locally so secrets never appear in shell
          # invocation logs on the remote host.
          ssh evergreen "umask 077 && cat > ${DEPLOY_DIR}/.env && chmod 600 ${DEPLOY_DIR}/.env" <<EOF
          NODE_ENV=production
          IMAGE_TAG=${IMAGE_TAG}

          # Postgres
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=reimbursement

          # API
          DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/reimbursement
          JWT_SECRET=${JWT_SECRET}

          # LINE Login
          LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
          LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
          LINE_REDIRECT_URI=https://reimbursement.thehfhotel.org/api/auth/callback/line
          WEB_BASE_URL=https://reimbursement.thehfhotel.org
          EOF

      - name: Log in to GHCR (on remote host)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh evergreen "echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USER}' --password-stdin"

      - name: Pull images and roll out
        run: |
          set -euo pipefail
          ssh evergreen <<'REMOTE'
          set -euo pipefail
          cd /home/reimbursement-v2/production
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          REMOTE

      - name: Health check
        # NB: avoid `exit 0` mid-heredoc — that closes ssh's stdin while the
        # local end is still writing the rest of the script, which yields
        # SIGPIPE and a non-zero ssh exit. Track outcomes in flags and let
        # the script reach its natural end.
        run: |
          set -euo pipefail
          ssh evergreen <<'REMOTE'
          set -uo pipefail

          api_ok=0
          for i in $(seq 1 30); do
            if docker exec reimbursement-v2-api curl -fsS --max-time 3 http://localhost:3001/health >/dev/null 2>&1; then
              echo "api healthy after ${i}s"
              api_ok=1
              break
            fi
            sleep 2
          done

          if [ "$api_ok" != 1 ]; then
            echo "::error::api /health never came up"
            docker logs --tail=80 reimbursement-v2-api || true
            exit 1
          fi

          # End-to-end via the host port the cloudflared tunnel routes to.
          # Hitting reimbursement.thehfhotel.org would still resolve to the
          # OLD app until the cutover ingress flip — checking 127.0.0.1:5800
          # directly is unambiguous: that's exactly the new web container.
          edge_ok=0
          for i in $(seq 1 30); do
            if curl -fsS --max-time 3 http://127.0.0.1:5800/healthz >/dev/null 2>&1; then
              echo "web → api healthy on :5800 after ${i}s"
              edge_ok=1
              break
            fi
            sleep 2
          done

          if [ "$edge_ok" != 1 ]; then
            echo "::error::web :5800 health check failed"
            docker logs --tail=80 reimbursement-v2-web || true
            docker logs --tail=80 reimbursement-v2-api || true
            exit 1
          fi

          echo "deploy looks healthy."
          REMOTE

      - name: Summary
        run: |
          {
            echo "## Reimbursement-v2 deployed"
            echo ""
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Image tag: \`sha-${{ github.sha }}\` (pinned in .env on host)"
            echo "- URL: https://reimbursement.thehfhotel.org"
          } >> "$GITHUB_STEP_SUMMARY"
