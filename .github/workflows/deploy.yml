name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys so two back-to-back pushes to main don't have their
# `docker compose up` interleave. cancel-in-progress is OFF — an in-flight
# deploy already pulled images and may be mid-migration.
concurrency:
  group: deploy-reimbursement
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Image names MUST be lowercase per OCI distribution spec; we publish under
  # the `thehfhotel` org to match the rest of the fleet (loyalty-app,
  # new-hotel, room-daily-reporter).
  IMAGE_OWNER: thehfhotel
  API_IMAGE: thehfhotel/reimbursement-api
  WEB_IMAGE: thehfhotel/reimbursement-web

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Build the api + web images on a hosted runner and push to GHCR.
  # We build both images in the same job so a single checkout populates the
  # build context for both Dockerfiles (the api Dockerfile needs the web
  # workspace manifests for `bun install --frozen-lockfile`, and vice
  # versa).
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push (api + web)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    outputs:
      sha: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── api image ─────────────────────────────────────────────────────
      - name: Compute api tags
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          # Distinct cache scopes per image so api/web can't evict each
          # other's layers.
          cache-from: type=gha,scope=reimbursement-api
          cache-to: type=gha,mode=max,scope=reimbursement-api
          platforms: linux/amd64

      # ── web image ─────────────────────────────────────────────────────
      - name: Compute web tags
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=reimbursement-web
          cache-to: type=gha,mode=max,scope=reimbursement-web
          platforms: linux/amd64

      - name: Summary
        run: |
          {
            echo "## Reimbursement images"
            echo ""
            echo "### api"
            echo '```'
            echo "${{ steps.meta-api.outputs.tags }}"
            echo '```'
            echo ""
            echo "### web"
            echo '```'
            echo "${{ steps.meta-web.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────
  # Deploy to evergreen via the self-hosted runner. The runner already lives
  # on the deploy host, so we don't ssh anywhere — we just write to the
  # local filesystem and shell out to docker.
  # ──────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to evergreen
    runs-on: [self-hosted, deploy]
    needs: [build]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    env:
      DEPLOY_DIR: /home/nut/reimbursement-production
      NGINX_DIR: /home/nut/nginx
      VHOST_FILE: reimbursement.conf

    steps:
      - name: Checkout (compose + nginx vhost only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.production.yml
            deploy/nginx/reimbursement.conf
          sparse-checkout-cone-mode: false

      - name: Stage compose file
        run: |
          set -euo pipefail
          mkdir -p "$DEPLOY_DIR"
          cp docker-compose.production.yml "$DEPLOY_DIR/docker-compose.yml"

      - name: Materialize .env from secrets
        # Tighten umask BEFORE writing so .env is born 0600 and never has a
        # world-readable window. Each var must be non-empty — fail loud if
        # the operator forgot to set a GitHub Secret.
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LINE_CHANNEL_ID: ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          for var in JWT_SECRET LINE_CHANNEL_ID LINE_CHANNEL_SECRET POSTGRES_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "::error::required secret $var is empty — refusing to write .env"
              exit 1
            fi
          done

          umask 077
          cat > "$DEPLOY_DIR/.env" <<EOF
          NODE_ENV=production
          IMAGE_TAG=latest

          # Postgres
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=reimbursement

          # API
          DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/reimbursement
          JWT_SECRET=${JWT_SECRET}

          # LINE Login (OAuth)
          LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
          LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
          LINE_REDIRECT_URI=https://reimbursement.thehfhotel.org/auth/line/callback
          WEB_BASE_URL=https://reimbursement.thehfhotel.org
          EOF
          chmod 600 "$DEPLOY_DIR/.env"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Ensure shared-nginx network exists
        # The network is created once when the shared-nginx container is set
        # up; this is just a defensive no-op if it's already there.
        run: docker network create shared-nginx 2>/dev/null || true

      - name: Pull images
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose pull

      - name: Up the stack
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          docker compose up -d --remove-orphans
          docker image prune -f

      # First-deploy idempotent setup: drop the vhost into shared-nginx and
      # reload. Re-runs are a no-op when the file is already in place + the
      # symlink already points at it.
      - name: Install shared-nginx vhost (first deploy)
        run: |
          set -euo pipefail
          mkdir -p "$NGINX_DIR/sites-available" "$NGINX_DIR/sites-enabled"

          NEW="$(cat deploy/nginx/reimbursement.conf)"
          AVAIL="$NGINX_DIR/sites-available/$VHOST_FILE"
          ENABLED="$NGINX_DIR/sites-enabled/$VHOST_FILE"

          NEEDS_RELOAD=false

          if [ ! -f "$AVAIL" ] || ! printf '%s' "$NEW" | cmp -s - "$AVAIL"; then
            echo "Writing $AVAIL"
            printf '%s' "$NEW" > "$AVAIL"
            NEEDS_RELOAD=true
          else
            echo "$AVAIL already up to date"
          fi

          if [ ! -L "$ENABLED" ]; then
            echo "Linking $ENABLED -> $AVAIL"
            ln -sf "$AVAIL" "$ENABLED"
            NEEDS_RELOAD=true
          fi

          if [ "$NEEDS_RELOAD" = "true" ]; then
            # Validate first so a typo never takes the rest of the host's
            # vhosts down with us.
            docker exec shared-nginx nginx -t
            docker exec shared-nginx nginx -s reload
            echo "shared-nginx reloaded"
          else
            echo "shared-nginx vhost unchanged — no reload needed"
          fi

      - name: Health check
        run: |
          set -euo pipefail

          # First, the api container's own /health endpoint via `docker exec`
          # since the api isn't bound to any host port.
          for i in $(seq 1 30); do
            if docker exec reimbursement-api curl -fsS --max-time 3 http://localhost:3001/health >/dev/null 2>&1; then
              echo "api healthy after ${i}s"
              break
            fi
            if [ "$i" = 30 ]; then
              echo "::error::api /health never came up"
              docker logs --tail=80 reimbursement-api || true
              exit 1
            fi
            sleep 2
          done

          # Then end-to-end through shared-nginx → web → api.
          for i in $(seq 1 30); do
            if curl -fsS --max-time 3 -H "Host: reimbursement.thehfhotel.org" http://127.0.0.1/api/health >/dev/null 2>&1; then
              echo "edge-to-api healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done

          echo "::error::edge-to-api health check failed"
          docker logs --tail=80 reimbursement-web || true
          docker logs --tail=80 reimbursement-api || true
          exit 1

      - name: Deployment summary
        run: |
          {
            echo "## Reimbursement deployed"
            echo ""
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Image tag: \`latest\` (also \`sha-${GITHUB_SHA::7}\`)"
            echo "- URL: https://reimbursement.thehfhotel.org"
          } >> "$GITHUB_STEP_SUMMARY"
