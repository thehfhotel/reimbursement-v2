name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '24'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dummy
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=critical
        continue-on-error: true  # Known vulnerabilities in dependencies, tracked separately

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reimbursement_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reimbursement_test
      NEXTAUTH_SECRET: test-secret-for-ci
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Generate coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage | Threshold |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|-----------|" >> $GITHUB_STEP_SUMMARY

            STATEMENTS=$(jq -r '.total.statements.pct' coverage/coverage-summary.json)
            BRANCHES=$(jq -r '.total.branches.pct' coverage/coverage-summary.json)
            FUNCTIONS=$(jq -r '.total.functions.pct' coverage/coverage-summary.json)
            LINES=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)

            get_emoji() {
              if [ "$(echo "$1 >= 80" | bc -l)" = "1" ]; then
                echo ":white_check_mark:"
              else
                echo ":x:"
              fi
            }

            echo "| Statements | ${STATEMENTS}% $(get_emoji $STATEMENTS) | 80% |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | ${BRANCHES}% $(get_emoji $BRANCHES) | 80% |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | ${FUNCTIONS}% $(get_emoji $FUNCTIONS) | 80% |" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | ${LINES}% $(get_emoji $LINES) | 80% |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Generated by vitest coverage report_" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dummy
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js application
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reimbursement_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reimbursement_e2e
      NEXTAUTH_SECRET: test-secret-for-ci
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  schema-verify:
    name: Schema Verification
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schema_verify
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schema_verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations on fresh database
        run: npx prisma migrate deploy

      - name: Verify schema matches Prisma schema
        run: |
          echo "Checking for schema drift..."
          npx prisma migrate diff --from-config-datasource --to-schema prisma/schema.prisma --exit-code || {
            echo "❌ SCHEMA DRIFT DETECTED!"
            echo "The database schema after migrations does not match prisma/schema.prisma"
            echo "This would cause runtime errors in production."
            exit 1
          }
          echo "✅ Schema verification passed"

      - name: Verify all migrations applied
        run: npx prisma migrate status

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [e2e, schema-verify]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push Docker image (runner)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image (migrator)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          push: true
          tags: ghcr.io/${{ github.repository }}:migrator
          cache-from: type=gha
          cache-to: type=gha,mode=max

  db-migrate:
    name: Database Migration
    needs: [docker]
    runs-on: [self-hosted, reimbursement]
    environment: production
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull migrator image
        run: docker pull ghcr.io/jwinut/reimbursement:migrator

      - name: Ensure network exists
        run: docker network create reimbursement-net 2>/dev/null || true

      - name: Ensure PostgreSQL is running
        run: |
          if ! docker ps | grep -q reimbursement-db; then
            echo "Starting PostgreSQL container..."
            docker run -d \
              --name reimbursement-db \
              --restart unless-stopped \
              --network reimbursement-net \
              -v reimbursement-postgres:/var/lib/postgresql/data \
              -e POSTGRES_USER=postgres \
              -e POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
              -e POSTGRES_DB=reimbursement \
              postgres:16-alpine

            echo "Waiting for PostgreSQL to be ready..."
            sleep 10
          else
            echo "PostgreSQL already running"
          fi

      - name: Run database migrations
        run: |
          docker run --rm \
            --network reimbursement-net \
            -e DATABASE_URL="postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@reimbursement-db:5432/reimbursement" \
            ghcr.io/jwinut/reimbursement:migrator

      - name: Verify migration status
        run: |
          docker run --rm \
            --network reimbursement-net \
            -e DATABASE_URL="postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@reimbursement-db:5432/reimbursement" \
            ghcr.io/jwinut/reimbursement:migrator \
            npx prisma migrate status

  deploy:
    name: Deploy to Production
    needs: [db-migrate]
    runs-on: [self-hosted, reimbursement]
    environment: production
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: docker pull ghcr.io/jwinut/reimbursement:latest

      - name: Create network
        run: docker network create reimbursement-net 2>/dev/null || true

      - name: Stop existing app container
        run: |
          docker stop reimbursement-app 2>/dev/null || true
          docker rm reimbursement-app 2>/dev/null || true

      - name: Run App container
        run: |
          docker run -d \
            --name reimbursement-app \
            --restart unless-stopped \
            --network reimbursement-net \
            -p 3000:3000 \
            -v reimbursement-uploads:/app/uploads \
            -e DATABASE_URL="postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@reimbursement-db:5432/reimbursement" \
            -e NEXTAUTH_URL="${{ vars.NEXTAUTH_URL }}" \
            -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            -e LINE_CLIENT_ID="${{ vars.LINE_CLIENT_ID }}" \
            -e LINE_CLIENT_SECRET="${{ secrets.LINE_CLIENT_SECRET }}" \
            -e MANAGER_LINE_IDS="${{ secrets.MANAGER_LINE_IDS }}" \
            ghcr.io/jwinut/reimbursement:latest

      - name: Cleanup old images
        run: docker image prune -f

      - name: Verify deployment
        run: |
          sleep 10
          # Check containers are running
          docker ps | grep reimbursement-app
          docker ps | grep reimbursement-db
          # Check health endpoint
          curl -sf http://localhost:3000/api/health || exit 1
          echo "Deployment successful!"
