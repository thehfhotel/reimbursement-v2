name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A push to main also kicks the deploy workflow; cancel any in-flight CI on
# the same branch so we don't burn minutes on stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck (all workspaces)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun --filter api db:generate

      - name: Typecheck
        run: bun run typecheck

  build-images:
    name: Build (api + web) — smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only on PRs — main pushes go through the deploy workflow which builds
    # AND pushes. Avoid duplicating the docker work here.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          cache-from: type=gha,scope=reimbursement-v2-api
          platforms: linux/amd64
      - name: Build web (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.web
          push: false
          cache-from: type=gha,scope=reimbursement-v2-web
          platforms: linux/amd64
