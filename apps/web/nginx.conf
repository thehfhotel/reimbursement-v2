# Reimbursement web container — serves the Vite SPA and reverse-proxies API
# traffic to the `api` service on the per-app docker network. The host-level
# shared-nginx vhost (deploy/nginx/reimbursement.conf) sits in front of THIS
# container by DNS name (`reimbursement-web`) on the shared-nginx network.

# Resolve container names via Docker's embedded DNS at 127.0.0.11. The `valid`
# TTL keeps DNS fresh after `docker compose up`'s rolling restart so we don't
# pin a stale IP for the api service.
resolver 127.0.0.11 valid=10s ipv6=off;

upstream reimbursement_api {
    # Service name from docker-compose.production.yml — this name is only
    # resolvable inside the `reimbursement_internal` network.
    server api:3001;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security defaults — TLS terminates upstream at Cloudflare/shared-nginx,
    # so we keep these conservative and let the edge add HSTS.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow large receipt-photo uploads (multipart/form-data via the api).
    # Receipts are typically ≤ 10 MB; bump the ceiling to 25 MB for headroom
    # without inviting abuse.
    client_max_body_size 25m;

    # Gzip text-y assets. Vite emits hashed filenames, so we let the client
    # cache aggressively below.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # API reverse proxy — Elysia listens on :3001 inside the api container.
    location /api/ {
        proxy_pass         http://reimbursement_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Receipt / transfer-screenshot uploads served by the api container.
    # `^~` makes this prefix take priority over the regex .jpg/.png/etc.
    # block below — without it, imp_*.jpg would match the regex first and
    # be served (404) from the SPA's static dir instead of being proxied.
    location ^~ /uploads/ {
        proxy_pass         http://reimbursement_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Hashed Vite assets — safe to cache for a year.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Container-local healthcheck endpoint (used by HEALTHCHECK + the host
    # vhost's optional probe).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — React Router handles client-side routes, so any path
    # that isn't a real file is served the index.html shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide dotfiles.
    location ~ /\. {
        deny all;
    }
}
