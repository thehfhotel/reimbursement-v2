# Reimbursement vhost on the host-level shared-nginx container.
#
# Drop into ~/nginx/sites-available/reimbursement.conf and symlink from
# ~/nginx/sites-enabled/reimbursement.conf, then reload shared-nginx:
#   docker exec shared-nginx nginx -s reload
#
# TLS terminates upstream at the Cloudflare Tunnel that fronts evergreen, so
# this vhost listens on port 80 only — same pattern as
# ~/nginx/sites-available/summary-thehfhotel-org and the room-daily-reporter
# / hf-analytics vhosts on this host.
#
# Container DNS: shared-nginx and reimbursement-web both attach to the
# external `shared-nginx` Docker network, so `proxy_pass` can address the
# web container by its `container_name`.

server {
    listen 80;
    server_name reimbursement.thehfhotel.org;

    # Defense-in-depth headers (the Cloudflare edge adds HSTS).
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/reimbursement-access.log;
    error_log  /var/log/nginx/reimbursement-error.log warn;

    # Receipt uploads are images and can run several MB. Keep this in sync
    # with the inner web nginx (apps/web/nginx.conf -> client_max_body_size).
    client_max_body_size 25m;

    location / {
        proxy_pass http://reimbursement-web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
