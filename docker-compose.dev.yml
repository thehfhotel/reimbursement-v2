services:
  postgres:
    image: postgres:16-alpine
    container_name: reimbursement-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reimbursement
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reimbursement"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
